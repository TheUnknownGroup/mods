name: Build Dalib
on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  ver: "v0.0.0+1.21.11+b.5"
  tag: "0.0.0+b.5"
  java_ver: "25"
  lib: "dalib"

jobs:
  build:
    if: ${{ contains(github.event.head_commit.message, '[real_d]')}}
    permissions:
      contents:
        write

    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: gradle/actions/wrapper-validation@v6

      - name: setup jdk
        uses: actions/setup-java@v5.3.0
        with:
          java-version: ${{ env.java_ver }}
          distribution: 'temurin'

      - run: chmod +x ./gradlew

      - run: ./gradlew :dalib:build

      - name: capture
        uses: actions/upload-artifact@v7
        with:
          name: jars
          path: dalib/build/libs

  publish:
    if: ${{ contains(github.event.head_commit.message, '[pub]') }}

    permissions:
      contents:
        write

    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: gradle/actions/wrapper-validation@v6

      - name: setup jdk
        uses: actions/setup-java@v5.3.0
        with:
          java-version: ${{ env.java_ver }}
          distribution: 'temurin'

      - name: setup gradle
        uses: gradle/actions/setup-gradle@v3

      - name: maven central
        run:
          ./gradlew :dalib:publishToMavenCentral -PmavenCentralUsername="${{ secrets.MAVEN_USER }}" -PmavenCentralPassword="${{ secrets.MAVEN_PASS }}" -PsigningInMemoryKey="${{ secrets.GPG_ARMOR }}" -PsigningInMemoryKeyPassword="${{ secrets.GPG_PASSWORD }}"

  modrinth:
    if: ${{ contains(github.event.head_commit.message, '[mr_d]') }}

    permissions:
      contents: write

    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: gradle/actions/wrapper-validation@v6

      - name: setup jdk
        uses: actions/setup-java@v5.3.0
        with:
          java-version: ${{ env.java_ver }}
          distribution: 'temurin'

      - name: exe gradlew & publish to modrinth
        env:
          MODRINTH_TOKEN: ${{ secrets.TOKEN }}
        run: |
          chmod +x ./gradlew
          ./gradlew :dalib:modrinth

  release:
    permissions:
      contents:
        write

    needs: [ build ]

    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: download
        uses: actions/download-artifact@v8
        with:
          path: jars
          merge-multiple: true

      - name: create
        uses: softprops/action-gh-release@v3
        with:
          name: Dalib ${{ env.ver }}
          tag_name: ${{ env.tag }}
          body_path: ${{ github.workspace }}/dalib/changelog.md
          draft: true
          generate_release_notes: true
          files: |
            jars/*.jar